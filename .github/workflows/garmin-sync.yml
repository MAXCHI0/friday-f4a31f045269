name: Garmin-Sync (Cloud)

on:
  schedule:
    - cron: "*/30 * * * *"  # alle 30 Min — GitHub verzögert Zeitpläne oft, so bleibt es trotzdem frisch
  workflow_dispatch: {}      # manueller Start über den Actions-Tab

permissions:
  contents: write

env:
  TZ: Europe/Berlin          # Zeitstempel in deutscher Zeit statt UTC

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Abhängigkeiten installieren
        run: pip install -q -r cloud/requirements.txt

      - name: Garmin-Token wiederherstellen
        run: |
          mkdir -p cloud/token
          echo "${{ secrets.GARMIN_TOKEN_B64 }}" | base64 -d | tar -x -C cloud/token
          ls cloud/token >/dev/null

      - name: Garmin-Daten abrufen (mit Wiederholung bei Garmin-Aussetzern)
        id: garmin
        run: |
          ok=0
          for attempt in 1 2 3; do
            if python cloud/sync_garmin.py --days 3 --out /tmp/garmin-notes --web-json data/garmin.json; then
              ok=1; break
            fi
            echo "Garmin-Abruf fehlgeschlagen (Versuch $attempt), warte 30s …"
            sleep 30
          done
          # Kein harter Fehler bei Garmin-Aussetzern — nächster Lauf holt es nach
          echo "ok=$ok" >> "$GITHUB_OUTPUT"

      - name: Änderungen hochladen (robust gegen parallele Pushes)
        if: steps.garmin.outputs.ok == '1'
        run: |
          git config user.name "garmin-bot"
          git config user.email "actions@github.com"
          cp data/garmin.json /tmp/garmin.json
          for attempt in 1 2 3 4 5; do
            git fetch -q origin main
            git reset -q --hard origin/main
            cp /tmp/garmin.json data/garmin.json
            git add data/garmin.json
            if git diff --cached --quiet; then echo "Keine Änderungen."; exit 0; fi
            git commit -q -m "Garmin-Update (Cloud) $(date '+%Y-%m-%d %H:%M')"
            if git push -q origin main; then echo "OK (Versuch $attempt)"; exit 0; fi
            echo "Kollision, neuer Versuch …"; sleep 3
          done
